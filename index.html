<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a73e8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Linux命令记忆" />
    <title>Linux 命令记忆</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/quiz-modes.css" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div id="app">
      <!-- Screen container (navigation injects content here) -->
      <main id="screen-container"></main>
      <!-- Bottom nav injected by app.js -->
    </div>

    <!-- Core libs (order matters) -->
    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/srs.js"></script>
    <script src="js/store.js"></script>
    <script src="js/router.js"></script>

    <!-- Components -->
    <script src="js/components/navbar.js"></script>
    <script src="js/components/commandCard.js"></script>
    <script src="js/components/flashcard3d.js"></script>
    <script src="js/components/progressRing.js"></script>

    <!-- Screens -->
    <script src="js/screens/home.js"></script>
    <script src="js/screens/browse.js"></script>
    <script src="js/screens/quizMenu.js"></script>
    <script src="js/screens/flashcardQuiz.js"></script>
    <script src="js/screens/choiceQuiz.js"></script>
    <script src="js/screens/fillBlankQuiz.js"></script>
    <script src="js/screens/matchQuiz.js"></script>
    <script src="js/screens/review.js"></script>
    <script src="js/screens/stats.js"></script>

    <!-- App entry (must be last) -->
    <script src="js/app.js"></script>

    <!-- Register Service Worker -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
